<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Starlog</title>

    <script type="module" src="js/main.js"></script>
    <link rel="stylesheet" href="css/main.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Jacquard+12&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Jacquard+12&family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Silkscreen:wght@400;700&display=swap" rel="stylesheet">   

</head>
<body>

    <h1 id="title">
            <div class="starlog">S</div>
            <div class="starlog">t</div>
            <div class="starlog">a</div>
            <div class="starlog">r</div>
            <div class="starlog">l</div>
            <div class="starlog">o</div>
            <div class="starlog">g</div>
    </h1>

    <div id="main">

        <nav id="nav">

            <svg fill="#ffffff" width="30" height="30" viewBox="0 0 32 32" version="1.1" xmlns="http://www.w3.org/2000/svg" stroke="#ffffff">
                <g id="SVGRepo_bgCarrier" stroke-width="0"/>
                <g id="SVGRepo_tracerCarrier" stroke-linecap="round" stroke-linejoin="round"/>
                <g id="SVGRepo_iconCarrier"> <title>shine</title> <path d="M22 10v4h4v4h-4v4h-4v4h-4v-4h-4v-4h-4v-4h4v-4h4v-4h4v4h4zM26 26v-4h-4v4h4zM26 6h-4v4h4v-4zM6 6v4h4v-4h-4zM6 26h4v-4h-4v4z"/> </g>
            </svg>

            <ul id="addDiv">
                <li class="MenuOptions" id="AddOption">
                    <input id="addCheckbox" name="addCheckbox" type="checkbox" value="add" class="hidden"/>
                    <label for="addCheckbox" class="MenuOption">ADD</label>
                </li>
                <li class="MenuOptions" id="RemoveOption">
                    <input id="removeCheckbox" name="removeCheckbox" type="checkbox" value="remove" class="hidden"/>
                    <label for="removeCheckbox" class="MenuOption">REMOVE</label>
                </li>
                <li class="MenuOptions" id="ClearAllOption">
                    <input id="clearAllCheckbox" name="clearAllCheckbox" type="checkbox" value="clearAll" class="hidden"/>
                    <label for="clearAllCheckbox" class="MenuOption">CLEAR ALL</label>
                </li>
            </ul>

        </nav>

        <div id="footer"></div>
    </div>

    <div id="signature"><a href="https://www.linkedin.com/in/cole-flannery-a13537202/">By Jaiden Cole Flannery</a></div>
    
</body>
</html>
